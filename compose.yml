services:
  app:
    build: ./app
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      MODEL: ${MODEL}
      RAG_URL: http://rag:8001
    depends_on:
      - rag

  rag:
    build: ./rag
    ports:
      - "8001:8001"
    environment:
      PORT: 8001
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      CHAT_MODEL: gemma3:27b
      EMBEDDING_MODEL: bge-m3
      CHROMA_HOST: ragbase
      CHROMA_PORT: 8000
    depends_on:
      - ragbase

  ragbase:
    image: chromadb/chroma:latest
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /data