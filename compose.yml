version: "3.9"

services:
  app:
    build: ./app
    ports:
      - "8000:8000"
    environment:
      PORT: ${PORT:-8000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://scanuser:scanpass@db:5432/scandb}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      MODEL: ${MODEL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-nimda123}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scanuser
      POSTGRES_PASSWORD: scanpass
      POSTGRES_DB: scandb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scanuser"]
      interval: 5s
      retries: 5