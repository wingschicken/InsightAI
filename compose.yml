services:
  app:
    build: ./app
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      DATABASE_URL: ${DATABASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      MODEL: ${MODEL}

  rag:
    build: ./rag
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DATABASE_URL: ${DATABASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      MODEL: ${MODEL}
      QDRANT_URL: ${QDRANT_URL}
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"