{% extends "base.html" %}
{% block title %}Chat{% endblock %}
{% block content %}
<style>
    .chat-wrapper {display:flex; gap:16px; height:calc(100vh - 200px); margin-top:0;}
    .chat-sidebar {width:250px; background:#161b22; border-radius:8px; border:1px solid #30363d; overflow-y:auto; padding:12px; flex-shrink:0;}
    body.light-mode .chat-sidebar {background:#f6f8fa; border:1px solid #d0d7de;}
    .chat-main {flex:1; display:flex; flex-direction:column;}
    .chat-list {list-style:none; padding:0; margin:0;}
    .chat-list-item {padding:8px 12px; margin:4px 0; border-radius:6px; cursor:pointer; transition:all 0.2s ease; color:#c9d1d9; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
    .chat-list-item:hover {background:#30363d;}
    body.light-mode .chat-list-item:hover {background:#e0e0e0;}
    .chat-list-item.active {background:#238636; color:#fff;}
    body.light-mode .chat-list-item.active {background:#238636; color:#fff;}
    .new-chat-btn {width:100%; padding:10px; background:#238636; color:#fff; border:none; border-radius:6px; cursor:pointer; margin-bottom:12px; font-weight:500; transition:all 0.2s ease;}
    .new-chat-btn:hover {background:#2ea043;}
    .chat-container {background:#0d1117; border:1px solid #30363d; border-radius:8px; padding:16px; margin:0; height:100%; display:flex; flex-direction:column; overflow:hidden;}
    body.light-mode .chat-container {background:#f6f8fa; border:1px solid #d0d7de;}
    #messages {display:flex; flex-direction:column; gap:8px; flex:1; overflow-y:auto; margin-bottom:16px;}
    .chat-message {margin:12px 0; padding:12px; border-radius:6px; line-height:1.5; word-wrap:break-word;}
    .chat-message.user {background:#238636; color:#fff; margin-left:20%; text-align:right;}
    .chat-message.ai {background:#161b22; color:#c9d1d9; margin-right:20%;}
    body.light-mode .chat-message.ai {background:#f0f6fc; color:#192734;}
    .chat-message strong {display:block; margin-bottom:6px; opacity:0.9;}
    .chat-message p {margin:8px 0;}
    .chat-message p:first-of-type {margin-top:0;}
    .chat-message ul, .chat-message ol {margin:8px 0; padding-left:20px;}
    .chat-message li {margin:4px 0;}
    .chat-message code {background:rgba(255,255,255,0.1); padding:2px 6px; border-radius:3px; font-family:monospace; font-size:0.9em;}
    .chat-message pre {background:rgba(0,0,0,0.3); padding:12px; border-radius:6px; overflow-x:auto; margin:8px 0; border-left:3px solid #58a6ff;}
    body.light-mode .chat-message pre {background:rgba(0,0,0,0.08); border-left-color:#0969da;}
    .chat-message pre code {background:none; padding:0; border-radius:0;}
    .chat-message h1, .chat-message h2, .chat-message h3 {margin:12px 0 8px 0; font-weight:600;}
    .chat-message h1 {font-size:1.3em;}
    .chat-message h2 {font-size:1.2em;}
    .chat-message h3 {font-size:1.1em;}
    .chat-message strong {font-weight:600;}
    .chat-message em {font-style:italic;}
    .chat-input-area {display:flex; gap:8px; margin-top:auto;}
    #message {flex:1; resize:none; height:60px; padding:12px; border:1px solid #30363d; border-radius:6px; background:#0d1117; color:#c9d1d9; font-family:inherit;}
    body.light-mode #message {background:#f6f8fa; color:#192734; border:1px solid #d0d7de;}
    .chat-placeholder {text-align:center; color:#888; padding:40px; font-size:14px;}
</style>

<h1>AI Chat Assistant</h1>

<div class="chat-wrapper">
    <div class="chat-sidebar">
        <button class="new-chat-btn" onclick="createNewChat()">+ New Chat</button>
        <ul class="chat-list" id="chat-list">
            {% for chat in chats %}
                <li class="chat-list-item" onclick="loadChat({{ chat.id }})" data-chat-id="{{ chat.id }}">{{ chat.title }}</li>
            {% endfor %}
        </ul>
    </div>
    
    <div class="chat-main">
        <div id="chat-container" class="chat-container">
            <div id="messages" style="display:flex; flex-direction:column; gap:8px; flex:1; overflow-y:auto;"></div>
            <div class="chat-placeholder" id="placeholder">Select or create a chat to start messaging.</div>
        </div>
        
        <div class="chat-input-area">
            <textarea 
                id="message" 
                name="message" 
                placeholder="Type your message here..." 
                onkeypress="if(event.key==='Enter' && event.ctrlKey) sendMessage();"
                disabled
            ></textarea>
            <button id="send-btn" type="button" onclick="sendMessage()" style="align-self:flex-end; height:60px; padding:10px 20px; background:#238636; color:#fff; border:none; border-radius:6px; cursor:pointer; font-weight:500;" disabled>Send</button>
        </div>
    </div>
</div>

<script>
    let currentChatId = null;
    const messageInput = document.getElementById('message');
    const sendBtn = document.getElementById('send-btn');
    const messagesContainer = document.getElementById('messages');
    const chatContainer = document.getElementById('chat-container');
    const placeholder = document.getElementById('placeholder');
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function parseMarkdown(text) {
        // Escape HTML entities first
        let html = escapeHtml(text);
        
        // Headers
        html = html.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
        html = html.replace(/^## (.*?)$/gm, '<h2>$1</h2>');
        html = html.replace(/^# (.*?)$/gm, '<h1>$1</h1>');
        
        // Code blocks (triple backticks)
        html = html.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
        
        // Inline code
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
        
        // Bold
        html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/__(.+?)__/g, '<strong>$1</strong>');
        
        // Italic
        html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
        html = html.replace(/_(.+?)_/g, '<em>$1</em>');
        
        // Unordered lists
        html = html.replace(/^\* (.*?)$/gm, '<li>$1</li>');
        html = html.replace(/^\- (.*?)$/gm, '<li>$1</li>');
        html = html.replace(/(<li>.*?<\/li>)/s, '<ul>$1</ul>');
        html = html.replace(/<\/li>\n<li>/g, '</li>\n<li>');
        
        // Ordered lists
        html = html.replace(/^\d+\. (.*?)$/gm, '<li>$1</li>');
        
        // Paragraphs
        html = html.replace(/\n\n/g, '</p><p>');
        html = '<p>' + html + '</p>';
        
        // Clean up empty paragraphs
        html = html.replace(/<p><\/p>/g, '');
        html = html.replace(/<p>(<h[1-3]>)/g, '$1');
        html = html.replace(/(<\/h[1-3]>)<\/p>/g, '$1');
        html = html.replace(/<p>(<pre>)/g, '$1');
        html = html.replace(/(<\/pre>)<\/p>/g, '$1');
        html = html.replace(/<p>(<ul>)/g, '$1');
        html = html.replace(/(<\/ul>)<\/p>/g, '$1');
        
        return html;
    }
    
    async function createNewChat() {
        try {
            const response = await fetch('/api/chats/new', { method: 'POST' });
            const data = await response.json();
            
            if (data.id) {
                loadChat(data.id);
                location.reload();
            }
        } catch (error) {
            alert('Error creating chat: ' + error.message);
        }
    }
    
    async function loadChat(chatId) {
        currentChatId = chatId;
        
        // Update active state
        document.querySelectorAll('.chat-list-item').forEach(item => {
            item.classList.remove('active');
            if (item.dataset.chatId == chatId) {
                item.classList.add('active');
            }
        });
        
        // Clear messages
        messagesContainer.innerHTML = '';
        placeholder.style.display = 'none';
        messageInput.disabled = false;
        sendBtn.disabled = false;
        messageInput.focus();
        
        // Load chat messages
        try {
            const response = await fetch(`/api/chats/${chatId}/messages`);
            const messages = await response.json();
            
            if (messages.length === 0) {
                placeholder.style.display = 'block';
                placeholder.textContent = 'No messages yet. Start the conversation!';
            } else {
                for (const msg of messages) {
                    const messageDiv = document.createElement('div');
                    messageDiv.className = 'chat-message ' + msg.role;
                    const content = msg.role === 'assistant' ? parseMarkdown(msg.content) : escapeHtml(msg.content);
                    messageDiv.innerHTML = `<strong>${msg.role === 'user' ? 'You' : 'Assistant'}:</strong> ${content}`;
                    messagesContainer.appendChild(messageDiv);
                }
            }
            
            chatContainer.scrollTop = chatContainer.scrollHeight;
        } catch (error) {
            alert('Error loading messages: ' + error.message);
        }
    }
    
    async function sendMessage() {
        if (!currentChatId) {
            alert('Please select or create a chat first');
            return;
        }
        
        const message = messageInput.value.trim();
        if (!message) return;
        
        placeholder.style.display = 'none';
        
        // Add user message to chat
        const userMessageDiv = document.createElement('div');
        userMessageDiv.className = 'chat-message user';
        userMessageDiv.innerHTML = `<strong>You:</strong> ${escapeHtml(message)}`;
        messagesContainer.appendChild(userMessageDiv);
        
        messageInput.value = '';
        messageInput.style.height = '60px';
        chatContainer.scrollTop = chatContainer.scrollHeight;
        sendBtn.disabled = true;
        messageInput.disabled = true;
        
        try {
            // Send message to server
            const formData = new FormData();
            formData.append('message', message);
            
            const response = await fetch(`/api/chats/${currentChatId}/message`, {
                method: 'POST',
                body: formData
            });
            
            if (!response.ok) {
                throw new Error('Failed to send message');
            }
            
            const data = await response.json();
            const aiResponse = data.response || 'No response received';
            
            // Add AI response to chat
            const aiMessageDiv = document.createElement('div');
            aiMessageDiv.className = 'chat-message ai';
            aiMessageDiv.innerHTML = `<strong>Assistant:</strong> ${parseMarkdown(aiResponse)}`;
            messagesContainer.appendChild(aiMessageDiv);
            
        } catch (error) {
            // Add error message to chat
            const errorDiv = document.createElement('div');
            errorDiv.className = 'chat-message ai';
            errorDiv.innerHTML = `<strong>Assistant:</strong> Sorry, I encountered an error: ${escapeHtml(error.message)}`;
            messagesContainer.appendChild(errorDiv);
        } finally {
            sendBtn.disabled = false;
            messageInput.disabled = false;
            messageInput.focus();
        }
        
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }
    
    // Auto-resize textarea
    messageInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.max(60, Math.min(this.scrollHeight, 200)) + 'px';
    });
    
    // Load the first chat on page load if available
    window.addEventListener('load', function() {
        const firstChat = document.querySelector('.chat-list-item');
        if (firstChat) {
            loadChat(firstChat.dataset.chatId);
        }
    });
</script>

{% endblock %}
